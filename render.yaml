    name: perpflow-keeper
    runtime: node
    rootDir: keeper
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: RPC_URL
        value: https://api.devnet.solana.com
      - key: PROGRAM_ID
        value: 7Ly59fzmJRyAk3KEHijsScahSrDtqFH1mjtTAqSZRWcH
      - key: SOL_USD_ORACLE
        value: 7UVimffxr9ow1uXYxsr4LHAcV58mLzhmwaeKvJ1pjLiE
      - key: KEEPER_KEYPAIR
        sync: false
